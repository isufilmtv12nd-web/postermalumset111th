<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Poster Showcase</title>

<style>
* { box-sizing: border-box; }

:root{
  --bg: transparent;
  --text: #111111;
  --sub: rgba(17,17,17,.62);
  --glass: rgba(255,255,255,.72);
  --glass-line: rgba(255,255,255,.45);
  --shadow: 0 20px 50px rgba(0,0,0,.10);
  --radius-card: 34px;
  --radius-info: 26px;
}

html, body{
  margin:0;
  padding:0;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
}

body{
  display:flex;
  justify-content:center;
}

.gallery{
  width:min(1200px, calc(100% - 28px));
  margin:24px auto 40px;
  display:flex;
  flex-direction:column;
  gap:42px;
  align-items:center;
}

/* 每張卡片置中 */
.poster-card{
  position:relative;
  width:min(420px, 92vw);
  aspect-ratio: 3 / 4.6;
  border-radius:var(--radius-card);
  overflow:hidden;
  background:#e9e9eb;
  box-shadow: var(--shadow);
  isolation:isolate;
}

/* 圖片完整顯示 */
.poster-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* 中間置中的玻璃資訊卡 */
.poster-info{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:calc(100% - 56px);
  max-width:320px;
  padding:18px 18px 16px;
  border-radius:var(--radius-info);
  background:var(--glass);
  border:1px solid var(--glass-line);
  backdrop-filter: blur(18px) saturate(1.2);
  -webkit-backdrop-filter: blur(18px) saturate(1.2);
  color:var(--text);
  text-align:left;
  box-shadow: 0 10px 30px rgba(0,0,0,.08);
}

/* 上方小字 */
.poster-tagline{
  margin:0 0 8px;
  font-size:11px;
  letter-spacing:1.8px;
  color:rgba(17,17,17,.48);
  font-weight:700;
  text-transform:uppercase;
}

/* 標題 */
.poster-title{
  margin:0;
  font-size:27px;
  line-height:1.08;
  font-weight:700;
  letter-spacing:-0.03em;
  color:#111;
}

/* 語言切換 */
.lang-switch{
  margin-top:14px;
  display:inline-flex;
  gap:6px;
  padding:4px;
  border-radius:999px;
  background:rgba(255,255,255,.46);
  border:1px solid rgba(255,255,255,.42);
}

.lang-btn{
  appearance:none;
  border:0;
  padding:7px 12px;
  border-radius:999px;
  background:transparent;
  color:rgba(17,17,17,.66);
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  transition:all .22s ease;
}

.lang-btn.active{
  background:#ffffff;
  color:#111;
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

/* 文字 */
.text{
  margin-top:14px;
  font-size:14px;
  line-height:1.7;
  color:var(--sub);
  min-height:72px;
}

.hidden{
  display:none;
}

/* 按鈕 */
.poster-btn{
  margin-top:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:10px 14px;
  border-radius:999px;
  background:#111;
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  letter-spacing:.01em;
  transition:transform .22s ease, opacity .22s ease, background .22s ease;
}

.poster-btn:hover{
  transform:translateY(-1px);
  opacity:.92;
}

/* Apple 感的微動態 */
.poster-card{
  transition:transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s cubic-bezier(.22,1,.36,1);
}

.poster-card:hover{
  transform:translateY(-4px);
  box-shadow: 0 28px 60px rgba(0,0,0,.14);
}

/* 手機版 */
@media (max-width: 640px){
  .gallery{
    width:min(100%, calc(100% - 18px));
    gap:28px;
    margin:14px auto 28px;
  }

  .poster-card{
    width:min(390px, 100%);
    aspect-ratio: 3 / 4.8;
    border-radius:28px;
  }

  .poster-info{
    width:calc(100% - 32px);
    max-width:none;
    padding:16px 16px 14px;
    border-radius:22px;
  }

  .poster-title{
    font-size:23px;
  }

  .poster-tagline{
    font-size:10px;
    margin-bottom:7px;
  }

  .text{
    font-size:13px;
    line-height:1.65;
    min-height:auto;
  }

  .poster-btn{
    width:100%;
    padding:11px 14px;
  }
}
</style>
</head>

<body>

<div class="gallery" id="gallery"></div>

<script>
const data = [
{
title:"水管嬰兒",
tag:"BLOOD TUBE BABY",
img:"https://raw.githubusercontent.com/isufilmtv12nd-web/testing/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_BTB_%E6%B5%B7%E5%A0%B1_.jpg",
link:"https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E6%B0%B4%E7%AE%A1%E5%AC%B0%E5%85%92-btb?authuser=0",
zh:"有些痛，不在身體，而在被迫承受的「意義」。當社會早已設下框架，女性是否真的能決定自己的身體與生命？",
en:"Some pain does not reside in the body, but in the meaning one is forced to bear. Can women truly decide for their own bodies?"
},
{
title:"透明的孩子",
tag:"THE WINGLESS CHILD",
img:"https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster01.jpg",
link:"https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E9%80%8F%E6%98%8E%E7%9A%84%E5%AD%A9%E5%AD%90-twc?authuser=0",
zh:"有些人活著，卻從未被看見。",
en:"Some people live, yet remain unseen."
},
{
title:"煙燻屋",
tag:"THROUGH THE SMOKE",
img:"https://raw.githubusercontent.com/isufilmtv12nd-web/testing/924a0647385fd7f96e2c2ed21704090330a0f0b7/%E6%B5%B7%E5%A0%B1/20260326_TTS_poster_v01.png",
link:"https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%85%99%E7%87%BB%E5%B1%8B-tts?authuser=0",
zh:"有些距離，不只是時間，而是說不出口的過去。",
en:"Some distances are not time, but unspoken pasts."
},
{
title:"真話",
tag:"MAKOTO",
img:"https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260326_zh_poster_v01.jpg",
link:"https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%9C%9F%E8%A9%B1-som?authuser=0",
zh:"有些謊言，是為了讓人繼續被愛。",
en:"Some lies are told so one may continue to be loved."
},
{
title:"瘋籠",
tag:"THE MAD CAGE",
img:"https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E6%B5%B7%E5%A0%B1/%E3%80%8A%E7%98%8B%E7%B1%A0%E3%80%8BPOSTER.JPG",
link:"https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%98%8B%E7%B1%A0-tmc?authuser=0",
zh:"有些人逃出了牢籠，卻從未真正自由。",
en:"Some escape the cage, yet never find freedom."
}
];

const gallery = document.getElementById("gallery");

data.forEach((item)=>{
  const el = document.createElement("div");
  el.innerHTML = `
    <div class="poster-card">
      <img src="${item.img}" alt="${item.title}">

      <div class="poster-info">
        <div class="poster-tagline">${item.tag}</div>
        <h2 class="poster-title">${item.title}</h2>

        <div class="lang-switch">
          <button class="lang-btn active" data-lang="zh">中文</button>
          <button class="lang-btn" data-lang="en">English</button>
        </div>

        <div class="text zh">${item.zh}</div>
        <div class="text en hidden">${item.en}</div>

        <a class="poster-btn" href="${item.link}" target="_top">View Full Page</a>
      </div>
    </div>
  `;

  const zh = el.querySelector(".zh");
  const en = el.querySelector(".en");
  const btns = el.querySelectorAll(".lang-btn");

  btns.forEach(btn => {
    btn.onclick = () => {
      btns.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");

      if(btn.dataset.lang === "zh"){
        zh.classList.remove("hidden");
        en.classList.add("hidden");
      } else {
        en.classList.remove("hidden");
        zh.classList.add("hidden");
      }
    };
  });

  gallery.appendChild(el);
});
</script>

</body>
</html>
