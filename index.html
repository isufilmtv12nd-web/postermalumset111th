<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Poster Showcase</title>

<style>
* { box-sizing: border-box; }

:root{
  --text:#ffffff;
  --sub:rgba(255,255,255,0.76);
  --muted:rgba(255,255,255,0.54);
  --line:rgba(255,255,255,0.10);
  --glass:rgba(18,18,18,0.30);
  --glass-strong:rgba(10,10,10,0.48);
  --pill:rgba(255,255,255,0.10);
  --shadow:0 22px 60px rgba(0,0,0,0.32);
  --radius:28px;
}

html, body{
  margin:0;
  padding:0;
  width:100%;
  background:transparent;
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang TC", "Noto Sans TC", sans-serif;
  overflow-x:hidden;
}

body{
  background:transparent;
}

/* 外層 */
.page{
  width:100%;
  padding:12px 0 28px;
  background:transparent;
}

/* 標題 */
.hero{
  width:min(1120px, calc(100% - 24px));
  margin:0 auto 18px;
}

.hero-kicker{
  font-size:11px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.hero-title{
  margin:0;
  font-size:clamp(28px, 5vw, 54px);
  line-height:1.02;
  letter-spacing:-0.04em;
  font-weight:700;
}

.hero-sub{
  margin:12px 0 0;
  max-width:760px;
  font-size:clamp(14px, 2vw, 17px);
  line-height:1.7;
  color:var(--sub);
}

/* 直向排列 */
.gallery{
  width:min(1120px, calc(100% - 24px));
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr;
  gap:22px;
}

/* 每張卡片 */
.poster-card{
  position:relative;
  width:100%;
  min-height:78svh;
  height:78svh;
  max-height:980px;
  border-radius:30px;
  overflow:hidden;
  background:rgba(0,0,0,0.10);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(18px) saturate(118%);
  -webkit-backdrop-filter:blur(18px) saturate(118%);
  box-shadow:var(--shadow);
  isolation:isolate;
  transform-style:preserve-3d;
  perspective:1400px;
  will-change:transform;
  transition:
    transform .24s ease,
    box-shadow .24s ease,
    border-color .24s ease;
}

.poster-card:hover{
  border-color:rgba(255,255,255,0.15);
  box-shadow:0 30px 70px rgba(0,0,0,0.38);
}

/* 海報背景 */
.poster-media{
  position:absolute;
  inset:0;
  overflow:hidden;
}

.poster-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
  transform:scale(1.03);
  transition:transform .28s ease;
  backface-visibility:hidden;
}

/* 電影感暗層 */
.poster-card::before{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    linear-gradient(180deg,
      rgba(0,0,0,0.08) 0%,
      rgba(0,0,0,0.04) 20%,
      rgba(0,0,0,0.14) 50%,
      rgba(0,0,0,0.82) 100%);
}

.poster-card::after{
  content:"";
  position:absolute;
  inset:0;
  z-index:1;
  pointer-events:none;
  background:
    radial-gradient(circle at 50% 14%, rgba(255,255,255,0.12), transparent 24%),
    linear-gradient(120deg, rgba(255,255,255,0.07), transparent 24%, transparent 74%, rgba(255,255,255,0.04));
  mix-blend-mode:screen;
  opacity:.28;
}

/* 底部玻璃資訊 */
.poster-info{
  position:absolute;
  left:14px;
  right:14px;
  bottom:14px;
  z-index:4;
  padding:16px;
  border-radius:22px;
  background:linear-gradient(180deg, var(--glass), var(--glass-strong));
  border:1px solid var(--line);
  backdrop-filter:blur(18px) saturate(120%);
  -webkit-backdrop-filter:blur(18px) saturate(120%);
  box-shadow:0 10px 28px rgba(0,0,0,0.24);
  transform:translateZ(34px);
}

.pill{
  display:inline-flex;
  align-items:center;
  padding:7px 12px;
  border-radius:999px;
  background:var(--pill);
  border:1px solid rgba(255,255,255,0.08);
  font-size:10px;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.86);
  margin-bottom:12px;
}

.poster-title{
  margin:0;
  font-size:clamp(28px, 4vw, 46px);
  line-height:1.02;
  font-weight:700;
  letter-spacing:-0.04em;
  text-shadow:0 2px 18px rgba(0,0,0,0.22);
}

.poster-tagline{
  margin:8px 0 0;
  font-size:12px;
  letter-spacing:.20em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.70);
}

.poster-summary{
  margin:12px 0 0;
  max-width:880px;
  font-size:14px;
  line-height:1.68;
  color:rgba(255,255,255,0.92);
}

/* 按鈕 */
.poster-actions{
  margin-top:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.poster-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  padding:11px 16px;
  border-radius:999px;
  text-decoration:none;
  cursor:pointer;
  font-size:13px;
  transition:transform .2s ease, background .2s ease, opacity .2s ease;
}

.poster-btn.primary{
  background:#fff;
  color:#111;
  font-weight:600;
}

.poster-btn.secondary{
  background:rgba(255,255,255,0.10);
  color:#fff;
  border:1px solid rgba(255,255,255,0.10);
}

.poster-btn:hover{
  transform:translateY(-1px);
}

/* 手機版 */
@media (max-width: 767px){
  .page{
    padding:8px 0 20px;
  }

  .hero{
    width:calc(100% - 16px);
    margin-bottom:14px;
  }

  .gallery{
    width:calc(100% - 16px);
    gap:16px;
  }

  .poster-card{
    height:82svh;
    min-height:640px;
    border-radius:22px;
  }

  .poster-info{
    left:10px;
    right:10px;
    bottom:10px;
    padding:14px;
    border-radius:18px;
  }

  .pill{
    font-size:9px;
    margin-bottom:10px;
  }

  .poster-title{
    font-size:30px;
  }

  .poster-tagline{
    font-size:11px;
    letter-spacing:.14em;
  }

  .poster-summary{
    font-size:13px;
    line-height:1.6;
  }

  .poster-btn{
    min-height:40px;
    padding:10px 14px;
    font-size:12px;
  }
}

/* 無 hover 裝置不要 tilt 太多 */
@media (hover: none){
  .poster-card{
    transform:none !important;
  }
}
</style>
</head>
<body>

<div class="page">
  <section class="hero">
    <div class="hero-kicker">Featured Posters</div>
    <h1 class="hero-title">Original Film Showcase</h1>
    <p class="hero-sub">
      以直向排列展示每部作品，保留 Netflix 電影感與 Apple 式玻璃 UI。
      每張海報都可直接跳轉至對應的 Google Sites 分頁。
    </p>
  </section>

  <section class="gallery" id="gallery"></section>
</div>

<script>
const posterData = [
  {
    title: "水管嬰兒",
    tagline: "BLOOD TUBE BABY",
    summary: "有些痛，不在身體，而在被迫承受的「意義」。點擊進入完整頁面查看更多中英內容。",
    img: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_BTB_%E6%B5%B7%E5%A0%B1_.jpg",
    link: "https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E6%B0%B4%E7%AE%A1%E5%AC%B0%E5%85%92-btb?authuser=0"
  },
  {
    title: "透明的孩子",
    tagline: "THE WINGLESS CHILD",
    summary: "有些人活著，卻從未被看見。點擊進入完整頁面查看更多中英內容。",
    img: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster01.jpg",
    link: "https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E9%80%8F%E6%98%8E%E7%9A%84%E5%AD%A9%E5%AD%90-twc?authuser=0"
  },
  {
    title: "煙燻屋",
    tagline: "THROUGH THE SMOKE",
    summary: "有些距離，不只是時間，而是說不出口的過去。點擊進入完整頁面查看更多中英內容。",
    img: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/924a0647385fd7f96e2c2ed21704090330a0f0b7/%E6%B5%B7%E5%A0%B1/20260326_TTS_poster_v01.png",
    link: "https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%85%99%E7%87%BB%E5%B1%8B-tts?authuser=0"
  },
  {
    title: "真話",
    tagline: "MAKOTO",
    summary: "有些謊言，是為了讓人繼續被愛。點擊進入完整頁面查看更多中英內容。",
    img: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260326_zh_poster_v01.jpg",
    link: "https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%9C%9F%E8%A9%B1-som?authuser=0"
  },
  {
    title: "瘋籠",
    tagline: "THE MAD CAGE",
    summary: "有些人逃出了牢籠，卻從未真正自由。點擊進入完整頁面查看更多中英內容。",
    img: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E6%B5%B7%E5%A0%B1/%E3%80%8A%E7%98%8B%E7%B1%A0%E3%80%8BPOSTER.JPG",
    link: "https://sites.google.com/view/malumm/%E4%BD%9C%E5%93%81works/%E7%98%8B%E7%B1%A0-tmc?authuser=0"
  }
];

const gallery = document.getElementById("gallery");

posterData.forEach((item, index) => {
  const article = document.createElement("article");
  article.innerHTML = `
    <div class="poster-card" tabindex="0" aria-label="${item.title}">
      <div class="poster-media">
        <img src="${item.img}" alt="${item.title}">
      </div>

      <div class="poster-info">
        <div class="pill">Featured · ${String(index + 1).padStart(2, "0")}</div>
        <h2 class="poster-title">${item.title}</h2>
        <p class="poster-tagline">${item.tagline}</p>
        <p class="poster-summary">${item.summary}</p>

        <div class="poster-actions">
          <a class="poster-btn primary" href="${item.link}" target="_top" rel="noopener">
            View Full Page
          </a>
        </div>
      </div>
    </div>
  `;

  const card = article.querySelector(".poster-card");
  const img = article.querySelector(".poster-media img");

  card.addEventListener("mousemove", (e) => {
    if (window.matchMedia("(hover: none)").matches) return;

    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const xc = rect.width / 2;
    const yc = rect.height / 2;
    const dx = (x - xc) / xc;
    const dy = (y - yc) / yc;

    const rotateY = dx * 4.2;
    const rotateX = -dy * 4.2;

    card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.003)`;
    img.style.transform = `scale(1.05) translateX(${dx * 8}px) translateY(${dy * 8}px)`;
  });

  card.addEventListener("mouseleave", () => {
    card.style.transform = "";
    img.style.transform = "scale(1.03)";
  });

  gallery.appendChild(article);
});
</script>

</body>
</html>
