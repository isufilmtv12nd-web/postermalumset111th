<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: transparent; /* ✅ 透明背景 */
  font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", sans-serif;
}

/* 🔹 主容器 */
.container {
  width: 100%;
  max-width: 480px; /* 控制寬度（手機最穩） */
  margin: auto;
  padding: 20px;
}

/* 🔹 每張卡片 */
.card {
  width: 100%;
  margin-bottom: 40px;
}

/* 🔹 圖片區（固定比例 2:3） */
.image-wrap {
  width: 100%;
  aspect-ratio: 2 / 3;
  border-radius: 20px;
  overflow: hidden;
  background: #eee;
  
  /* Apple感 */
  box-shadow: 
    0 10px 30px rgba(0,0,0,0.08);
}

.image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 🔹 文字 */
.title {
  margin-top: 16px;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
}

.subtitle {
  margin-top: 6px;
  font-size: 13px;
  color: rgba(0,0,0,0.5);
  letter-spacing: 2px;
}

.desc {
  margin-top: 10px;
  font-size: 14px;
  line-height: 1.6;
  color: rgba(0,0,0,0.7);
}

/* 🔹 電腦版優化 */
@media (min-width: 768px) {
  .container {
    max-width: 600px;
  }

  .title {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- 卡片 1 -->
  <div class="card">
    <div class="image-wrap">
      <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_BTB_%E6%B5%B7%E5%A0%B1_.jpg">
    </div>
    <div class="title">水管嬰兒</div>
    <div class="subtitle">BLOOD TUBE BABY</div>
    <div class="desc">在廢棄的地下管網中，一個非法的生命實驗悄然甦醒...</div>
  </div>

  <!-- 卡片 2 -->
  <div class="card">
    <div class="image-wrap">
      <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster01.jpg">
    </div>
    <div class="title">透明的孩子</div>
    <div class="subtitle">THE WINGLESS CHILD</div>
    <div class="desc">這群孩子沒有翅膀，卻試圖在高樓廢墟間學習飛翔...</div>
  </div>

  <!-- 卡片 3 -->
  <div class="card">
    <div class="image-wrap">
      <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260326_zh_poster_v01.jpg">
    </div>
    <div class="title">真話</div>
    <div class="subtitle">MAKOTO</div>
    <div class="desc">真相往往藏在語言的裂縫中，一名記者在調查神秘失蹤案時...</div>
  </div>

  <!-- 卡片 4 -->
  <div class="card">
    <div class="image-wrap">
      <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/924a0647385fd7f96e2c2ed21704090330a0f0b7/%E6%B5%B7%E5%A0%B1/20260326_TTS_poster_v01.png">
    </div>
    <div class="title">烟熏屋</div>
    <div class="subtitle">THROUGH THE SMOKE</div>
    <div class="desc">封閉空間與瀰漫煙霧，四個陌生人在意外後受困...</div>
  </div>
  
  <!-- 卡片 5 -->
  <div class="card">
    <div class="image-wrap">
      <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E6%B5%B7%E5%A0%B1/%E3%80%8A%E7%98%8B%E7%B1%A0%E3%80%8BPOSTER.JPG">
    </div>
    <div class="title">瘋籠</div>
    <div class="subtitle">THE MAD CAGE</div>
    <div class="desc">在廢棄的地下管網中，一個非法的生命實驗悄然甦醒...</div>
  </div>

</div>

</body>
</html>
