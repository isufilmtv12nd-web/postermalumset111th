<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  overflow-x: auto;
}

/* 🔹 畫廊 */
.gallery {
  display: flex;
  gap: 30px;
  padding: 60px;
}

/* 🔹 圖片 */
.gallery img {
  height: 260px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(255,255,255,0.08);
}

/* 🔥 滑鼠效果 */
.gallery img:hover {
  transform: scale(1.08);
  box-shadow: 0 20px 60px rgba(255,255,255,0.2);
}

/* 🔹 放大畫面 */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.4s;
}

/* 🔹 大圖 */
.viewer img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 14px;
  box-shadow: 0 30px 100px rgba(0,0,0,1);
  animation: zoomIn 0.4s;
}

/* ✨ 動畫 */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes zoomIn {
  from {transform: scale(0.8);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<div class="gallery">
  <img src="你的圖片1">
  <img src="你的圖片2">
  <img src="你的圖片3">
</div>

<div class="viewer" id="viewer">
  <img id="big">
</div>

<script>
const viewer = document.getElementById("viewer");
const big = document.getElementById("big");

document.querySelectorAll(".gallery img").forEach(img => {
  img.onclick = () => {
    viewer.style.display = "flex";
    big.src = img.src;
  };
});

viewer.onclick = () => {
  viewer.style.display = "none";
};
</script>

</body>
</html>
