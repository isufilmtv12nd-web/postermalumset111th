<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #ffd6e0, #f5a9c2, #000);
  overflow: hidden;
  font-family: sans-serif;
}

/* 🌫️ 中央展示 */
.main {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  height: 460px;
  z-index: 10;
}

.main img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 12px;
  box-shadow: 0 20px 80px rgba(0,0,0,0.8);
  transition: 0.4s;
}

/* 🎡 圓形容器 */
.circle {
  position: absolute;
  width: 600px;
  height: 600px;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* 小圖 */
.thumb {
  position: absolute;
  width: 90px;
  height: 130px;
  cursor: pointer;
  transition: 0.4s;
  opacity: 0.6;
}

.thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
}

/* hover 聚焦 */
.thumb:hover {
  transform: scale(1.3);
  opacity: 1;
}

/* ✨ 發光選中 */
.active {
  transform: scale(1.4);
  opacity: 1;
  filter: drop-shadow(0 0 10px #fff);
}
</style>
</head>

<body>

<!-- 中央大圖 -->
<div class="main">
  <img id="mainImage" src="你的主圖">
</div>

<!-- 圓形 -->
<div class="circle" id="circle"></div>

<script>
const images = [
  "https://raw.githubusecontent.com/isufilmtv12nd-web/testing/blob/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_BTB_%E6%B5%B7%E5%A0%B1_.jpg",
  ""https://raw.githubusercontent.com/isufilmtv12nd-web/testing/blob/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster01.jpg"",
  "https://raw.githubusecontent.com/isufilmtv12nd-web/testing/blob/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster02.jpg",
  "https:/raw.githubusecontent.com/isufilmtv12nd-web/testing/blob/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster02.jpg",
  "https://raw.githubusecontent.com/isufilmtv12nd-web/testing/blob/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster02.jpg"
];

const circle = document.getElementById("circle");
const mainImage = document.getElementById("mainImage");

const radius = 250;

images.forEach((src, i) => {
  const angle = (i / images.length) * (Math.PI * 2);

  const x = radius * Math.cos(angle) + 300;
  const y = radius * Math.sin(angle) + 300;

  const div = document.createElement("div");
  div.className = "thumb";

  div.style.left = x + "px";
  div.style.top = y + "px";

  const img = document.createElement("img");
  img.src = src;

  div.appendChild(img);
  circle.appendChild(div);

  div.onmouseenter = () => {
    mainImage.src = src;

    document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
    div.classList.add("active");
  };
});
</script>

</body>
</html>
