<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>電影海報展示</title>
<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  overflow-x: auto;
}

/* 🔹 畫廊 */
.gallery {
  display: flex;
  gap: 30px;
  padding: 60px;
  justify-content: center;
}

/* 🔹 海報容器 */
.poster {
  text-align: center; /* 讓標題置中 */
}

/* 🔹 海報圖片 */
.poster img {
  height: 260px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.4s;
  box-shadow: 0 10px 30px rgba(255,255,255,0.08);
}

/* 🔥 滑鼠效果 */
.poster img:hover {
  transform: scale(1.08);
  box-shadow: 0 20px 60px rgba(255,255,255,0.2);
}

/* 🔹 海報下方標題 */
.title {
  color: #fff;
  font-size: 14px;
  margin-top: 8px;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* 🔹 放大畫面 */
.viewer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.4s;
  z-index: 1000;
}

/* 🔹 大圖 */
.viewer img {
  max-width: 85%;
  max-height: 85%;
  border-radius: 14px;
  box-shadow: 0 30px 100px rgba(0,0,0,1);
  animation: zoomIn 0.4s;
}

/* ✨ 動畫 */
@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes zoomIn {
  from {transform: scale(0.8);}
  to {transform: scale(1);}
}
</style>
</head>

<body>

<!-- 海報畫廊 -->
<div class="gallery">
  <div class="poster">
    <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/46deae50711aef010865469eec7afd164f2ff7fe/%E6%B5%B7%E5%A0%B1/20260325_BTB_%E6%B5%B7%E5%A0%B1_.jpg" alt="水管嬰兒">
    <div class="title">&lt;&lt; 水管嬰兒 BLOOD TUBE BABY &gt;&gt;</div>
  </div>
  <div class="poster">
    <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260325_TWC_poster01.jpg" alt="透明的孩子">
    <div class="title">&lt;&lt; 透明的孩子 THE WINGLESS CHILD &gt;&gt;</div>
  </div>
  <div class="poster">
    <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/fbb7fda070c3691e91cab0e9835cc8400653e9df/%E6%B5%B7%E5%A0%B1/20260326_zh_poster_v01.jpg" alt="真話">
    <div class="title">&lt;&lt; 真話 MAKOTO &gt;&gt;</div>
  </div>
    <img src="https://raw.githubusercontent.com/isufilmtv12nd-web/testing/blob/924a0647385fd7f96e2c2ed21704090330a0f0b7/%E6%B5%B7%E5%A0%B1/20260326_TTS_poster_v01.png" alt="煙燻屋">
    <div class="title">&lt;&lt; 煙燻屋 THROUGH THE SMOKE &gt;&gt;</div>
  </div>
</div>

<!-- 點擊放大查看 -->
<div class="viewer" id="viewer">
  <img id="big" alt="大圖">
</div>

<script>
const viewer = document.getElementById("viewer");
const big = document.getElementById("big");

document.querySelectorAll(".gallery img").forEach(img => {
  img.onclick = () => {
    viewer.style.display = "flex";
    big.src = img.src;
  };
});

viewer.onclick = () => {
  viewer.style.display = "none";
};
</script>

</body>
</html>
