<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Crew Cards</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: manipulation;
      background: linear-gradient(180deg, #ffffff 0%, #f5f5f7 100%);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display",
        "Helvetica Neue", Arial, sans-serif;
      color: #1d1d1f;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: 100vw;
      height: 100svh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .wrap {
      width: min(100%, 1400px);
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero {
      flex: 0 0 auto;
      text-align: center;
      margin-bottom: 10px;
    }

    .eyebrow {
      font-size: clamp(8px, 1.2vw, 13px);
      font-weight: 600;
      color: #6e6e73;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }

    .title {
      margin: 0;
      font-size: clamp(16px, 2vw, 30px);
      line-height: 1.1;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .crew-grid {
      flex: 1 1 auto;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(4px, 0.8vw, 14px);
      align-content: center;
      width: 100%;
      min-height: 0;
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: clamp(10px, 1.2vw, 22px);
      overflow: hidden;
      cursor: pointer;
      background: rgba(255,255,255,0.78);
      border: 1px solid rgba(255,255,255,0.75);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      backdrop-filter: blur(18px) saturate(160%);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      min-width: 0;
      min-height: 0;
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: inherit;
    }

    .card-front {
      z-index: 2;
      display: block;
      background: #fff;
    }

    .card-front img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      object-position: center top;
      background: #e8e8ed;
    }

    .card-back {
      z-index: 3;
      display: none;
      background: linear-gradient(
        180deg,
        rgba(255,255,255,0.96) 0%,
        rgba(245,245,247,0.96) 100%
      );
      padding: clamp(6px, 1vw, 18px);
      text-align: center;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: #1d1d1f;
    }

    .card.flipped .card-front {
      display: none;
    }

    .card.flipped .card-back {
      display: flex;
    }

    .role-zh {
      font-size: clamp(7px, 0.9vw, 15px);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .role-en {
      margin-top: 4px;
      font-size: clamp(5px, 0.6vw, 10px);
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      line-height: 1.35;
      word-break: break-word;
    }

    .divider {
      width: clamp(14px, 2vw, 34px);
      height: 1px;
      margin: clamp(5px, 1vw, 12px) 0;
      background: rgba(0,0,0,0.12);
      flex-shrink: 0;
    }

    .name-zh {
      font-size: clamp(7px, 0.85vw, 14px);
      font-weight: 600;
      line-height: 1.3;
      letter-spacing: -0.02em;
      word-break: break-word;
    }

    .name-en {
      margin-top: 4px;
      font-size: clamp(5px, 0.62vw, 10px);
      color: #6e6e73;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      line-height: 1.35;
      word-break: break-word;
    }

    @media (max-width: 768px) {
      .app {
        padding: 6px;
      }

      .hero {
        margin-bottom: 6px;
      }

      .crew-grid {
        gap: 4px;
      }

      .card-back {
        padding: 5px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="wrap">
      <section class="hero">
        <div class="eyebrow">製作團隊 Production Team</div>
        <h1 class="title">劇組成員 Members</h1>
      </section>

      <div class="crew-grid" id="crewGrid"></div>
    </div>
  </div>

  <script>
    const FALLBACK = "https://via.placeholder.com/600x800/f2f2f2/8e8e93?text=Photo";

    const data = [
      {
        name: "林雅馨 CHRISTINA LIN",
        role: "導演 DIRECTOR",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E5%AE%B6%E6%99%AF_%E5%B7%A5%E4%BD%9C%E4%BA%BA%E5%93%A1_rxuanp-41.JPG"
      },
      {
        name: "駱玟蒨 LO WEN CHIEN",
        role: "副導演 ASSISTANT DIRECTOR",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A4951.JPEG"
      },
      {
        name: "蘇雪穎 SO SUET WING",
        role: "製片 LINE PRODUCER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A5392.JPEG"
      },
      {
        name: "楊景允 GERALD YANG",
        role: "攝影師 CINEMATOGRAPHER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E5%AE%B6%E6%99%AF_%E5%B7%A5%E4%BD%9C%E4%BA%BA%E5%93%A1_rxuanp-42.JPG"
      },
      {
        name: "鄭文淵 ZHENG WEN YUAN",
        role: "燈光師 GAFFER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E6%94%9D%E5%BD%B1%E6%A3%9A_%E5%B7%A5%E4%BD%9C%E4%BA%BA%E5%93%A1_rxuanp-9.JPG"
      },
      {
        name: "林珮晨 PEI CHEN LIN",
        role: "燈光師 GAFFER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A5389.JPEG"
      },
      {
        name: "孫雅尼 SUNNY",
        role: "美術設計 PRODUCTION DESIGNER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A5136.JPEG"
      },
      {
        name: "王詩閔 WANG SHIH MIN",
        role: "美術設計 PRODUCTION DESIGNER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A5073.JPEG"
      },
      {
        name: "周詠貴 ZHOU YONG GUI",
        role: "造型設計 STYLIST & COSTUME DESIGN",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A6095.JPEG"
      },
      {
        name: "施君婷 ANISTON SZE",
        role: "聲音設計 PRODUCTION SOUND MIXER",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/_K8A5090.JPEG"
      },
      {
        name: "簡子濱 JIAN ZIH BIN",
        role: "剪輯 EDITOR",
        photo: "https://raw.githubusercontent.com/isufilmtv12nd-web/testing/main/%E6%94%9D%E5%BD%B1%E6%A3%9A_%E5%B7%A5%E4%BD%9C%E4%BA%BA%E5%93%A1_rxuanp-33.JPG"
      }
    ];

    const grid = document.getElementById("crewGrid");

    function splitText(text) {
      const parts = text.trim().split(" ");
      return {
        zh: parts[0] || "",
        en: parts.slice(1).join(" ") || ""
      };
    }

    function createCard(member, index) {
      const role = splitText(member.role);
      const name = splitText(member.name);

      return `
        <div class="card" data-index="${index}" tabindex="0" aria-label="${member.name}">
          <div class="card-front">
            <img
              src="${member.photo}"
              alt="${member.name}"
              loading="lazy"
              decoding="async"
              referrerpolicy="no-referrer"
              onerror="this.onerror=null; this.src='${FALLBACK}'"
            />
          </div>

          <div class="card-back">
            <div class="role-zh">${role.zh}</div>
            <div class="role-en">${role.en}</div>
            <div class="divider"></div>
            <div class="name-zh">${name.zh}</div>
            <div class="name-en">${name.en}</div>
          </div>
        </div>
      `;
    }

    function renderCards() {
      grid.innerHTML = data.map(createCard).join("");

      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("click", () => {
          card.classList.toggle("flipped");
        });

        card.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            card.classList.toggle("flipped");
          }
        });
      });
    }

    document.addEventListener("DOMContentLoaded", renderCards);
  </script>
</body>
</html>
